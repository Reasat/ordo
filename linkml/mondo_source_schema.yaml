id: https://w3id.org/monarch-initiative/mondo-source-schema
name: mondo_source_schema
description: >-
  LinkML schema for a Mondo-ready ontology source. Core fields: labels, definitions,
  synonyms, hierarchy. Extended slots align with predicates allowed to remain on
  component OWL after ROBOT preprocessing (see config/properties.txt); populate only what
  the transform exports.
version: 0.4.0

prefixes:
  linkml:     https://w3id.org/linkml/
  mondo_src:  https://w3id.org/monarch-initiative/mondo-source-schema/
  rdfs:       http://www.w3.org/2000/01/rdf-schema#
  skos:       http://www.w3.org/2004/02/skos/core#
  dcterms:    http://purl.org/dc/terms/
  obo:        http://purl.obolibrary.org/obo/
  oboInOwl:   http://www.geneontology.org/formats/oboInOwl#
  owl:        http://www.w3.org/2002/07/owl#
  RO:         http://purl.obolibrary.org/obo/RO_
  BFO:        http://purl.obolibrary.org/obo/BFO_
  MONDO:      http://purl.obolibrary.org/obo/mondo#
  Orphanet:   http://www.orpha.net/ORDO/Orphanet_

imports:
  - linkml:types

default_prefix: mondo_src
default_range: string


# ── Enums ───────────────────────────────────────────────────────────────────

enums:

  SynonymTypeEnum:
    description: Types of synonyms used in Mondo source ingests.
    permissible_values:
      omim_included:
        description: Synonym from an included OMIM entry.
        meaning: MONDO:omim_included
      generated_from_label:
        description: Synonym automatically generated from the label.
        meaning: MONDO:GENERATED_FROM_LABEL
      generated:
        description: Automatically generated synonym.
        meaning: MONDO:GENERATED
      omim_formerly:
        description: Synonym from a formerly associated OMIM entry.
        meaning: MONDO:omim_formerly
      abbreviation:
        description: Abbreviation synonym.
        meaning: MONDO:ABBREVIATION


# ── Classes ──────────────────────────────────────────────────────────────────

classes:

  OntologyDocument:
    description: >-
      Top-level container representing a single ontology source release.
    tree_root: true
    class_uri: owl:Ontology
    slots:
      - title
      - dcterms_title
      - version
      - sources
      - terms

  Synonym:
    description: A synonym value with an optional type annotation.
    slots:
      - synonym_text
      - synonym_type

  OntologyTerm:
    description: >-
      A single class / concept from the source ontology.
    class_uri: owl:Class
    slots:
      - id
      - label
      - definition
      - exact_synonyms
      - related_synonyms
      - narrow_synonyms
      - broad_synonyms
      - close_synonyms
      - in_subsets
      - sources
      - synonym_types
      - skos_exact_match
      - skos_broad_match
      - skos_narrow_match
      - skos_related_match
      - omo_0003012
      - has_material_basis_in_germline_mutation_in
      - has_material_basis_in_somatic_mutation_in
      - has_material_basis_in
      - part_of
      - has_part
      - parents
      - deprecated
    slot_usage:
      exact_synonyms:
        annotations:
          owl.template: |-
            {% for s in exact_synonyms %}
            AnnotationAssertion({% if s.synonym_type %}Annotation(oboInOwl:hasSynonymType {{s.synonym_type.meaning}}) {% endif %}oboInOwl:hasExactSynonym {{id}} "{{s.synonym_text|replace('"', '\\"')}}")
            {% endfor %}
      related_synonyms:
        annotations:
          owl.template: |-
            {% for s in related_synonyms %}
            AnnotationAssertion({% if s.synonym_type %}Annotation(oboInOwl:hasSynonymType {{s.synonym_type.meaning}}) {% endif %}oboInOwl:hasRelatedSynonym {{id}} "{{s.synonym_text|replace('"', '\\"')}}")
            {% endfor %}
      narrow_synonyms:
        annotations:
          owl.template: |-
            {% for s in narrow_synonyms %}
            AnnotationAssertion({% if s.synonym_type %}Annotation(oboInOwl:hasSynonymType {{s.synonym_type.meaning}}) {% endif %}oboInOwl:hasNarrowSynonym {{id}} "{{s.synonym_text|replace('"', '\\"')}}")
            {% endfor %}
      broad_synonyms:
        annotations:
          owl.template: |-
            {% for s in broad_synonyms %}
            AnnotationAssertion({% if s.synonym_type %}Annotation(oboInOwl:hasSynonymType {{s.synonym_type.meaning}}) {% endif %}oboInOwl:hasBroadSynonym {{id}} "{{s.synonym_text|replace('"', '\\"')}}")
            {% endfor %}


# ── Slots ────────────────────────────────────────────────────────────────────

slots:

  # -- Document-level metadata --

  title:
    description: >-
      Primary human-readable name of the ontology (maps to rdfs:label on owl:Ontology,
      matching BioPortal / component OWL).
    slot_uri: rdfs:label
    required: true

  dcterms_title:
    description: Optional Dublin Core title (dcterms:title) when present on the ontology.
    slot_uri: dcterms:title
    annotations:
      owl: AnnotationAssertion

  version:
    description: Version string for this release (e.g. "2024ab" or "2025-03-01").
    slot_uri: owl:versionInfo
    required: true

  terms:
    description: All terms included in this source release.
    range: OntologyTerm
    multivalued: true
    inlined_as_list: true
    required: true

  # -- Synonym fields --

  synonym_text:
    description: The synonym string value.
    required: true

  synonym_type:
    description: Optional type annotation for this synonym.
    range: SynonymTypeEnum

  # -- Term identity --

  id:
    description: >-
      Canonical CURIE identifier for the term (e.g. "ICD10CM:A00" or "ICD10WHO:A00").
    identifier: true
    slot_uri: dcterms:identifier
    range: uriorcurie
    required: true

  # -- Core annotation properties --

  label:
    description: The preferred human-readable label.
    slot_uri: rdfs:label
    required: true
    annotations:
      owl: AnnotationAssertion

  definition:
    description: Textual definition (IAO:0000115).
    slot_uri: obo:IAO_0000115
    recommended: true
    annotations:
      owl: AnnotationAssertion

  # -- Synonyms (oboInOwl) --

  exact_synonyms:
    description: Exact-match synonyms (oboInOwl:hasExactSynonym).
    slot_uri: oboInOwl:hasExactSynonym
    multivalued: true
    range: Synonym
    inlined_as_list: true
    recommended: true

  related_synonyms:
    description: Related synonyms (oboInOwl:hasRelatedSynonym).
    slot_uri: oboInOwl:hasRelatedSynonym
    multivalued: true
    range: Synonym
    inlined_as_list: true

  narrow_synonyms:
    description: Narrower synonyms (oboInOwl:hasNarrowSynonym).
    slot_uri: oboInOwl:hasNarrowSynonym
    multivalued: true
    range: Synonym
    inlined_as_list: true

  broad_synonyms:
    description: Broader synonyms (oboInOwl:hasBroadSynonym).
    slot_uri: oboInOwl:hasBroadSynonym
    multivalued: true
    range: Synonym
    inlined_as_list: true

  close_synonyms:
    description: skos:closeMatch (mapping / close match).
    slot_uri: skos:closeMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  # -- Cross-refs and extra annotations --

  in_subsets:
    description: oboInOwl:inSubset.
    slot_uri: oboInOwl:inSubset
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  sources:
    description: oboInOwl:source.
    slot_uri: oboInOwl:source
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  synonym_types:
    description: oboInOwl:hasSynonymType.
    slot_uri: oboInOwl:hasSynonymType
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  skos_exact_match:
    description: skos:exactMatch.
    slot_uri: skos:exactMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_broad_match:
    description: skos:broadMatch.
    slot_uri: skos:broadMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_narrow_match:
    description: skos:narrowMatch.
    slot_uri: skos:narrowMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_related_match:
    description: skos:relatedMatch.
    slot_uri: skos:relatedMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  omo_0003012:
    description: OMO:0003012 (ontology metadata slot used on some terms).
    slot_uri: obo:OMO_0003012
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  # -- Object properties (RO / BFO) allowed on component classes --

  has_material_basis_in_germline_mutation_in:
    description: Germline mutation causal basis (RO:0004001).
    slot_uri: RO:0004001
    multivalued: true
    range: OntologyTerm
    annotations:
      owl: ObjectSomeValuesFrom

  has_material_basis_in_somatic_mutation_in:
    description: Somatic mutation causal basis (RO:0004003).
    slot_uri: RO:0004003
    multivalued: true
    range: OntologyTerm
    annotations:
      owl: ObjectSomeValuesFrom

  has_material_basis_in:
    description: General material basis (RO:0004004).
    slot_uri: RO:0004004
    multivalued: true
    range: OntologyTerm
    annotations:
      owl: ObjectSomeValuesFrom

  part_of:
    description: Part-of relationship (BFO:0000050).
    slot_uri: BFO:0000050
    multivalued: true
    range: OntologyTerm
    annotations:
      owl: ObjectSomeValuesFrom

  has_part:
    description: Has-part relationship (BFO:0000051).
    slot_uri: BFO:0000051
    multivalued: true
    range: OntologyTerm
    annotations:
      owl: ObjectSomeValuesFrom

  # -- Hierarchy --

  parents:
    description: >-
      Direct is-a parents (source CURIEs). Non-source subclass targets are not listed.
    slot_uri: rdfs:subClassOf
    range: OntologyTerm
    multivalued: true
    annotations:
      owl: SubClassOf

  deprecated:
    description: True when this term is marked owl:deprecated.
    slot_uri: owl:deprecated
    range: boolean
    annotations:
      owl: AnnotationAssertion
