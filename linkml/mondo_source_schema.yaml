id: https://w3id.org/monarch-initiative/mondo-source-schema
name: mondo_source_schema
description: >-
  LinkML schema for a Mondo-ready ontology source. Core fields: labels, definitions,
  synonyms, hierarchy. Extended slots align with predicates allowed to remain on
  ORDO component OWL after ROBOT preprocessing (see config/properties.txt); populate only what
  the transform exports.
version: 0.3.1

prefixes:
  linkml:     https://w3id.org/linkml/
  mondo_src:  https://w3id.org/monarch-initiative/mondo-source-schema/
  rdfs:       http://www.w3.org/2000/01/rdf-schema#
  skos:       http://www.w3.org/2004/02/skos/core#
  dcterms:    http://purl.org/dc/terms/
  obo:        http://purl.obolibrary.org/obo/
  oboInOwl:   http://www.geneontology.org/formats/oboInOwl#
  owl:        http://www.w3.org/2002/07/owl#
  RO:         http://purl.obolibrary.org/obo/RO_
  BFO:        http://purl.obolibrary.org/obo/BFO_
  MONDO:      http://purl.obolibrary.org/obo/mondo#
  Orphanet:   http://www.orpha.net/ORDO/Orphanet_

imports:
  - linkml:types

default_prefix: mondo_src
default_range: string


# ── Classes ──────────────────────────────────────────────────────────────────

classes:

  OntologyDocument:
    description: >-
      Top-level container representing a single ontology source release.
      Slots mirror owl:Ontology annotations on the component file (rdfs:label, versionInfo,
      comments, source, dcterms:title). Ontology-level oboInOwl:hasExactSynonym (e.g. nested
      synonym-type annotations) is not exported: linkml-owl can emit incomplete axiom
      reification that ROBOT cannot parse.
    tree_root: true
    class_uri: owl:Ontology
    slots:
      - title
      - dcterms_title
      - version
      - comments
      - sources
      - descriptions
      - terms

  OntologyTerm:
    description: >-
      A single class / concept from the source ontology.
    class_uri: owl:Class
    slots:
      - id
      - label
      - definition
      - exact_synonyms
      - related_synonyms
      - narrow_synonyms
      - broad_synonyms
      - close_synonyms
      - obo_has_close_synonym
      - database_cross_references
      - comments
      - see_also
      - descriptions
      - in_subsets
      - sources
      - synonym_types
      - skos_exact_match
      - skos_broad_match
      - skos_narrow_match
      - skos_related_match
      - mondo_generated
      - mondo_generated_from_label
      - mondo_omim_included
      - mondo_omim_formerly
      - mondo_abbreviation
      - omo_0003012
      - ro_0004001
      - ro_0004003
      - ro_0004004
      - bfo_0000050
      - bfo_0000051
      - parents
      - is_root
      - deprecated


# ── Slots ────────────────────────────────────────────────────────────────────

slots:

  # -- Document-level metadata --

  title:
    description: >-
      Primary human-readable name of the ontology (maps to rdfs:label on owl:Ontology,
      matching BioPortal / component OWL).
    slot_uri: rdfs:label
    required: true

  dcterms_title:
    description: Optional Dublin Core title (dcterms:title) when present on the ontology.
    slot_uri: dcterms:title
    annotations:
      owl: AnnotationAssertion

  version:
    description: Version string for this release (e.g. "2024ab" or "2025-03-01").
    slot_uri: owl:versionInfo
    required: true

  terms:
    description: All terms included in this source release.
    range: OntologyTerm
    multivalued: true
    inlined_as_list: true
    required: true

  # -- Term identity --

  id:
    description: >-
      Canonical CURIE identifier for the term (e.g. "ICD10CM:A00" or "ICD10WHO:A00").
    identifier: true
    slot_uri: dcterms:identifier
    range: uriorcurie
    required: true

  # -- Core annotation properties --

  label:
    description: The preferred human-readable label.
    slot_uri: rdfs:label
    required: true
    annotations:
      owl: AnnotationAssertion

  definition:
    description: Textual definition (IAO:0000115).
    slot_uri: obo:IAO_0000115
    recommended: true
    annotations:
      owl: AnnotationAssertion

  # -- Synonyms (oboInOwl) --

  exact_synonyms:
    description: Exact-match synonyms (oboInOwl:hasExactSynonym).
    slot_uri: oboInOwl:hasExactSynonym
    multivalued: true
    recommended: true
    annotations:
      owl: AnnotationAssertion

  related_synonyms:
    description: Related synonyms (oboInOwl:hasRelatedSynonym).
    slot_uri: oboInOwl:hasRelatedSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  narrow_synonyms:
    description: Narrower synonyms (oboInOwl:hasNarrowSynonym).
    slot_uri: oboInOwl:hasNarrowSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  broad_synonyms:
    description: Broader synonyms (oboInOwl:hasBroadSynonym).
    slot_uri: oboInOwl:hasBroadSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  close_synonyms:
    description: skos:closeMatch (mapping / close match).
    slot_uri: skos:closeMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  obo_has_close_synonym:
    description: oboInOwl:hasCloseSynonym (distinct from skos:closeMatch).
    slot_uri: oboInOwl:hasCloseSynonym
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  # -- Cross-refs and extra annotations (config/properties.txt) --

  database_cross_references:
    description: oboInOwl:hasDbXref.
    slot_uri: oboInOwl:hasDbXref
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  comments:
    description: rdfs:comment.
    slot_uri: rdfs:comment
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  see_also:
    description: rdfs:seeAlso (IRIs or literals as serialized strings).
    slot_uri: rdfs:seeAlso
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  descriptions:
    description: dcterms:description (distinct from IAO definition).
    slot_uri: dcterms:description
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  in_subsets:
    description: oboInOwl:inSubset.
    slot_uri: oboInOwl:inSubset
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  sources:
    description: oboInOwl:source.
    slot_uri: oboInOwl:source
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  synonym_types:
    description: oboInOwl:hasSynonymType.
    slot_uri: oboInOwl:hasSynonymType
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  skos_exact_match:
    description: skos:exactMatch.
    slot_uri: skos:exactMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_broad_match:
    description: skos:broadMatch.
    slot_uri: skos:broadMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_narrow_match:
    description: skos:narrowMatch.
    slot_uri: skos:narrowMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  skos_related_match:
    description: skos:relatedMatch.
    slot_uri: skos:relatedMatch
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  mondo_generated:
    description: mondo:GENERATED.
    slot_uri: MONDO:GENERATED
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  mondo_generated_from_label:
    description: mondo:GENERATED_FROM_LABEL.
    slot_uri: MONDO:GENERATED_FROM_LABEL
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  mondo_omim_included:
    description: mondo:omim_included.
    slot_uri: MONDO:omim_included
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  mondo_omim_formerly:
    description: mondo:omim_formerly.
    slot_uri: MONDO:omim_formerly
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  mondo_abbreviation:
    description: mondo:ABBREVIATION.
    slot_uri: MONDO:ABBREVIATION
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  omo_0003012:
    description: OMO:0003012 (ontology metadata slot used on some terms).
    slot_uri: obo:OMO_0003012
    multivalued: true
    annotations:
      owl: AnnotationAssertion

  # -- Object properties (RO / BFO) allowed on component classes --

  ro_0004001:
    description: RO:0004001 object property targets.
    slot_uri: RO:0004001
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  ro_0004003:
    description: RO:0004003 object property targets.
    slot_uri: RO:0004003
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  ro_0004004:
    description: RO:0004004 object property targets.
    slot_uri: RO:0004004
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  bfo_0000050:
    description: BFO:0000050 object property targets.
    slot_uri: BFO:0000050
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  bfo_0000051:
    description: BFO:0000051 object property targets.
    slot_uri: BFO:0000051
    multivalued: true
    range: uriorcurie
    annotations:
      owl: AnnotationAssertion

  # -- Hierarchy --

  parents:
    description: >-
      Direct is-a parents (source CURIEs). Non-source subclass targets are not listed.
    slot_uri: rdfs:subClassOf
    range: OntologyTerm
    multivalued: true
    annotations:
      owl: SubClassOf

  is_root:
    description: >-
      True when this term has no named source-ontology parents and sits at the top of
      the hierarchy. Relaxes the parents requirement.
    range: boolean
    ifabsent: "false"

  deprecated:
    description: True when this term is marked owl:deprecated.
    slot_uri: owl:deprecated
    range: boolean
    ifabsent: "false"
    annotations:
      owl: AnnotationAssertion
