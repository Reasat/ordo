# Verify full pipeline on pull requests (no release).

name: Build

on:
  pull_request:
    paths:
      - "Makefile"
      - "config/**"
      - "sparql/**"
      - "linkml/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (ROBOT + LinkML)
        run: |
          docker run --rm \
            -e ROBOT_PLUGINS_DIRECTORY=/tools/robot-plugins \
            -v "$PWD:/work" \
            -w /work \
            obolibrary/odkfull:v1.6 \
            bash -lc "pip3 install --break-system-packages uv && uv sync && make build-release"
